<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - GUNA PHARMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M10 3h4v7h7v4h-7v7h-4v-7H3v-4h7z" fill="#12A454"/></svg></div>
    <div><b>GUNA PHARMA</b><span>Hi, <span id="navCustomerName">there</span></span></div>
  </div>
  <nav>
    <a href="products.html">Products</a>
    <a href="orders.html">My Orders</a>
    <a href="cart.html" class="cart-badge">Cart <span class="count" id="navCartCount" style="display:none;">0</span></a>
    <button class="logout-btn" id="logoutBtn">Log out</button>
  </nav>
</div>

<div class="page-wrap" style="max-width:820px;">
  <div class="banner banner-success" id="placedBanner"></div>
  <div class="page-head">
    <h1>My Orders</h1>
    <p>Track your GUNA PHARMA order status here.</p>
  </div>
  <div id="ordersWrap"></div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
(function(){
  if (!GUNA.requireLogin()) return;

  document.getElementById('logoutBtn').addEventListener('click', () => {
    GUNA.clearSession();
    window.location.href = 'login.html?loggedout=1';
  });

  const params = new URLSearchParams(window.location.search);
  const placedId = params.get('placed');
  if (placedId) {
    const b = document.getElementById('placedBanner');
    b.textContent = `Order ${placedId} placed successfully! Complete your GPay payment to confirm it.`;
    b.classList.add('show');
  }

  function money(n){ return GUNA.money(n); }
  function statusBadgeClass(status){
    if (status === 'Delivered') return 'badge-green';
    if (status === 'Cancelled') return 'badge-red';
    if (status === 'Payment Pending') return 'badge-warn';
    return 'badge-blue';
  }

  (async function load(){
    const wrap = document.getElementById('ordersWrap');
    try {
      const { orders } = await GUNA.api('/api/orders');
      if (orders.length === 0) {
        wrap.innerHTML = `
          <div class="group empty-state">
            <p>You haven't placed any orders yet.</p>
            <a href="products.html" class="btn btn-primary">Browse Products</a>
          </div>`;
        return;
      }
      wrap.innerHTML = orders.map(o => `
        <div class="group" style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div>
              <b class="mono">${o.order_id}</b><br>
              <span style="font-size:12px;color:var(--muted-2);">${new Date(o.created_at).toLocaleString()}</span>
            </div>
            <span class="badge ${statusBadgeClass(o.status)}">${o.status}</span>
          </div>
          <table>
            <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
            <tbody>
              ${o.items.map(i => `<tr><td>${i.product_name}</td><td>${i.quantity}</td><td>${money(i.price)}</td></tr>`).join('')}
            </tbody>
          </table>
          <div class="summary-row" style="margin-top:10px;"><span>Subtotal</span><span>${money(o.subtotal)}</span></div>
          <div class="summary-row"><span>Discount</span><span class="discount">− ${money(o.discount_amount)}</span></div>
          <div class="summary-row total"><span>Total Paid via GPay</span><span>${money(o.total_amount)}</span></div>
        </div>
      `).join('');
    } catch (err) {
      wrap.innerHTML = '<p>Could not load your orders right now.</p>';
    }
  })();
})();
</script>
</body>
</html>
