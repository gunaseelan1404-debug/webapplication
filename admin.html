<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - GUNA PHARMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M10 3h4v7h7v4h-7v7h-4v-7H3v-4h7z" fill="#12A454"/></svg></div>
    <div><b>GUNA PHARMA</b><span>Admin dashboard</span></div>
  </div>
  <nav>
    <button class="logout-btn" id="lockBtn">Lock</button>
  </nav>
</div>

<div class="page-wrap" style="max-width:1000px;">

  <div id="keyGate" class="group" style="max-width:420px;margin:40px auto;">
    <div class="page-head"><h1 style="font-size:20px;">Admin access</h1><p>Enter your admin key to view orders.</p></div>
    <div class="field"><label>Admin Key</label><input type="password" id="adminKey" placeholder="Enter ADMIN_KEY from your .env file"></div>
    <button class="btn btn-primary btn-block" id="unlockBtn">UNLOCK</button>
    <div class="banner banner-error" id="keyBanner"></div>
  </div>

  <div id="dashboard" style="display:none;">
    <div class="page-head">
      <h1>Orders</h1>
      <p>Confirm GPay payments and update order status.</p>
    </div>
    <div class="group" style="overflow-x:auto;">
      <table id="ordersTable">
        <thead>
          <tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment Ref</th><th>Status</th></tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="js/config.js"></script>
<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const KEY_STORAGE = 'guna_admin_key';

  function money(n){ return '₹' + Number(n).toFixed(2); }

  async function adminApi(path, options = {}){
    const key = sessionStorage.getItem(KEY_STORAGE);
    const headers = Object.assign({ 'Content-Type': 'application/json', 'x-admin-key': key }, options.headers || {});
    const base = (window.GUNA_CONFIG && window.GUNA_CONFIG.API_BASE_URL) || '';
    const res = await fetch(base + path, Object.assign({}, options, { headers }));
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  async function loadOrders(){
    const { orders } = await adminApi('/api/admin/orders');
    const statuses = ['Payment Pending', 'Paid', 'Processing', 'Shipped', 'Delivered', 'Cancelled'];
    $('ordersBody').innerHTML = orders.map(o => `
      <tr>
        <td class="mono">${o.order_id}</td>
        <td>${o.first_name} ${o.last_name}<br><span style="font-size:11px;color:var(--muted-2);">${o.email} · ${o.mobile}</span></td>
        <td>${o.items.map(i => `${i.product_name} × ${i.quantity}`).join('<br>')}</td>
        <td><b>${money(o.total_amount)}</b><br><span style="font-size:11px;color:var(--muted-2);">(15% off ${money(o.subtotal)})</span></td>
        <td>${o.payment_reference || '—'}</td>
        <td>
          <select class="status-select" data-order="${o.id}">
            ${statuses.map(s => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
        </td>
      </tr>
    `).join('');

    document.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async () => {
        try {
          await adminApi('/api/admin/orders/' + sel.dataset.order, {
            method: 'PATCH',
            body: JSON.stringify({ status: sel.value })
          });
        } catch (err) {
          alert(err.message || 'Could not update status.');
        }
      });
    });
  }

  function showDashboard(){
    $('keyGate').style.display = 'none';
    $('dashboard').style.display = 'block';
    loadOrders().catch(err => alert(err.message));
  }

  $('unlockBtn').addEventListener('click', async () => {
    const key = $('adminKey').value.trim();
    if (!key) return;
    sessionStorage.setItem(KEY_STORAGE, key);
    try {
      await adminApi('/api/admin/orders');
      showDashboard();
    } catch (err) {
      $('keyBanner').textContent = 'Invalid admin key.';
      $('keyBanner').classList.add('show');
      sessionStorage.removeItem(KEY_STORAGE);
    }
  });

  $('lockBtn').addEventListener('click', () => {
    sessionStorage.removeItem(KEY_STORAGE);
    $('dashboard').style.display = 'none';
    $('keyGate').style.display = 'block';
  });

  if (sessionStorage.getItem(KEY_STORAGE)) {
    adminApi('/api/admin/orders').then(showDashboard).catch(() => sessionStorage.removeItem(KEY_STORAGE));
  }
})();
</script>
</body>
</html>
